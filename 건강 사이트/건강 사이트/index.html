<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>청소년 건강 플랫폼</title>

<style>
body {
  font-family: Arial;
  background-color: #f5f7fa;
  text-align: center;
}

h1 {
  color: #2c3e50;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 200px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card a {
  text-decoration: none;
  color: #3498db;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background-color: #3498db;
  color: white;
  cursor: pointer;
}

input {
  padding: 8px;
  width: 200px;
}
</style>

</head>

<body>

<h1>청소년 건강 관리 플랫폼</h1>

<h3 id="tip">건강 팁을 확인해보세요</h3>
<button onclick="randomTip()">건강 팁 보기</button>

<div class="container">

  <div class="card">
    <h2>눈 건강</h2>
    <a href="eye.html">바로가기</a>
  </div>

  <div class="card">
    <h2>자세 건강</h2>
    <a href="posture.html">바로가기</a>
  </div>

  <div class="card">
    <h2>수면 건강</h2>
    <a href="sleep.html">바로가기</a>
  </div>

</div>

<hr>

<h2>댓글</h2>

<input id="commentInput" placeholder="댓글 입력">
<button onclick="addComment()">등록</button>

<ul id="commentList"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASmbvKQ9vTSxHpFwhya-D-qXg9Qe92v0A",
  authDomain: "heath-c4a07.firebaseapp.com",
  projectId: "heath-c4a07",
  storageBucket: "heath-c4a07.firebasestorage.app",
  messagingSenderId: "993554656901",
  appId: "1:993554656901:web:a0c54c20dcb86205c943ec"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addComment = async function() {
  const input = document.getElementById("commentInput");
  if (input.value === "") return;

  await addDoc(collection(db, "comments"), {
    text: input.value
  });

  input.value = "";
};

onSnapshot(collection(db, "comments"), (snapshot) => {
  const list = document.getElementById("commentList");
  list.innerHTML = "";

  snapshot.forEach((doc) => {
    const li = document.createElement("li");
    li.textContent = doc.data().text;
    list.appendChild(li);
  });
});

window.randomTip = function() {
  const tips = [
    "20분마다 눈 쉬기",
    "허리를 곧게 펴세요",
    "하루 7시간 이상 수면",
    "스트레칭을 해주세요"
  ];

  const random = tips[Math.floor(Math.random() * tips.length)];
  document.getElementById("tip").innerText = random;
};

</script>

</body>
</html>
